<!doctype html>
<html>
	<head>
		<title>Genuine Test Print</title>
		<meta charset="utf-8" />
		<link rel="stylesheet" href="./style.css" />
		<script src="./library/utils/fxhash.js"></script>
		<script src="./library/p5/p5.min.js"></script>
		<script src="./parameters/params.js"></script>
		<script src="./library/utils/utils.js"></script>
		<script src="./library/utils/shaderManager.js"></script>
		<script src="./library/utils/shaderPipeline.js"></script>
		<script src="./library/utils/swatchPalette.js"></script>
		<script src="./library/p5/spectral.js"></script>
		<script src="./shapes/mover.js"></script>
		<script src="./shaders/sketch-shaders.js"></script>
		<script src="sketch.js"></script>

		<!-- if you need to import js scripts do it here -->
	</head>
	<body>
		<div class="info-toggle">Edit parameters</div>
		<div class="container" aria-label="Controls panel">
			<div class="title-wrapper">
				<h1 class="title">Controls</h1>
				<h6 class="spec">Apply updates without changing seed/hash</h6>
				<p class="status">
					Activity status:
					<span class="spin-container">
						<span class="spin">.</span>
					</span>
				</p>
			</div>

			<div class="info-wrapper">
				<hr />
				<p class="info-container"><span class="info">Hash : </span><span class="kb-params hash"></span></p>
				<hr />

				<p class="info-container"><span class="info">Render status : </span><span class="kb-params dashboard"></span></p>
				<hr />
			</div>

			<div class="controls-form"></div>

			<div class="save-wrapper">
				<button class="button btn-apply" id="param-apply">
					<span>Apply</span>
				</button>
				<button class="button btn-download" id="param-download" style="margin-top: 10px">
					<span>Download</span>
				</button>
			</div>
		</div>

		<main class="main">
			<span class="frame"></span>
		</main>

		<!-- Debug bounds overlay -->
		<div id="debug-bounds" class="debug-bounds">
			<div id="debug-base-padding" class="debug-rect base-padding"></div>
			<div id="debug-mover-bounds" class="debug-rect mover-bounds"></div>
		</div>
		<!-- Mobile controls container with download and FPS buttons -->
		<div id="controls" class="controls">
			<button id="toggle-fps" class="control-button" title="Toggle FPS Counter">FPS</button>
		</div>
		<!-- WEBPACK will inject the bundle.js here -->
	</body>
</html>
